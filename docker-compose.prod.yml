services:
  db:
    image: postgres:16-alpine
    container_name: apollodocs_db_prod
    restart: always
    env_file:
      - .env
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apollodocs_api_prod
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apollodocs_frontend_prod
    restart: always
    env_file:
      - .env
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: apollodocs_nginx_prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  pgdata_prod:
