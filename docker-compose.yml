services:
  db:
    image: postgres:16-alpine
    container_name: apollodocs_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: apollodocs_user
      POSTGRES_PASSWORD: apollodocs_pass
      POSTGRES_DB: apollodocs_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apollodocs_user -d apollodocs_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apollodocs_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://apollodocs_user:apollodocs_pass@db:5432/apollodocs_dev
      - SECRET_KEY=dev-secret-key
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apollodocs_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - BACKEND_URL=http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
