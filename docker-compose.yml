services:
  db:
    image: postgres:16-alpine
    container_name: apollodocs_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: apollodocs_user
      POSTGRES_PASSWORD: apollodocs_pass
      POSTGRES_DB: apollodocs_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
